<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Voice Logger</title>
    <style>
        :root { --primary: #2563eb; --secondary: #3b82f6; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        #userDisplay { font-size: 0.8rem; color: #64748b; margin-bottom: 1rem; }
        #status { margin: 1rem 0; font-weight: 600; color: #1e293b; min-height: 1.5rem; }
        #transcribedText { font-size: 0.9rem; color: #475569; margin: 10px 0; font-style: italic; min-height: 1.2rem; }
        button { border: none; border-radius: 1rem; padding: 1rem 2rem; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: transform 0.1s; width: 100%; margin-bottom: 1rem; }
        button:active { transform: scale(0.98); }
        .btn-voice { background: var(--primary); color: white; }
        .btn-gps { background: #10b981; color: white; }
        .btn-settings { background: none; color: #94a3b8; font-size: 0.7rem; text-decoration: underline; margin-top: 1rem; }
        .recording { background: #ef4444 !important; animation: pulse 1.5s infinite; }
        .secure-badge { background: #fee2e2; color: #991b1b; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="encryptionMode"></div>
    <div id="userDisplay">Logged as: <span id="userNameText">...</span></div>
    <div id="status">Ready</div>
    <div id="transcribedText"></div>
    
    <button id="voiceBtn" class="btn-voice">Voice Only</button>
    <button id="gpsBtn" class="btn-gps">Voice + GPS</button>
    
    <button onclick="changeUser()" class="btn-settings">Change Name</button>
</div>

<script>
    // --- 1. CONFIG & URL PARSING ---
    const urlParams = new URLSearchParams(window.location.search);
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqS5ydpAkDGIGmkGPtbnJ0fz37SoIDRhLHGQT4Bd-5zT3tG2AD2FspQYyw4Kcgi6l9/exec";
    const isEncryptMode = urlParams.get('encrypt') === '1';
    let encryptionKey = null;

    // --- 2. CRYPTO ENGINE (AES-GCM) ---
    async function getCryptoKey(password) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
        return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: enc.encode("static-salt-for-demo"), iterations: 100000, hash: "SHA-256" },
            keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt"]
        );
    }

    async function encryptData(plainText, password) {
        const key = await getCryptoKey(password);
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encoded = new TextEncoder().encode(plainText);
        const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, encoded);
        
        // Combine IV and Ciphertext into one Base64 string
        const combined = new Uint8Array(iv.length + ciphertext.byteLength);
        combined.set(iv);
        combined.set(new Uint8Array(ciphertext), iv.length);
        return btoa(String.fromCharCode(...combined));
    }

    // --- 3. GATEKEEPER FUNCTIONS ---
    function isValid(id) {
        if (!id || id.length < 3 || id.length > 6) return false;
        const base = id.slice(0, -1).toUpperCase();
        const providedDigit = parseInt(id.slice(-1));
        let sum = 0;
        for (let i = 0; i < base.length; i++) { sum += (base.charCodeAt(i) - 64); }
        return (providedDigit === (sum % 10));
    }

    function validateAndLoadID() {
        const id = urlParams.get('id');
        if (!id || !isValid(id)) {
            document.body.innerHTML = '<div style="text-align:center; padding:50px;"><h1>Invalid link</h1></div>';
            return false; 
        }
        localStorage.setItem('loggerUserID', id);
        return true;
    }

    if (validateAndLoadID()) {
        let userName = localStorage.getItem('loggerUserName');
        const status = document.getElementById('status');
        const display = document.getElementById('transcribedText');
        const voiceBtn = document.getElementById('voiceBtn');
        const gpsBtn = document.getElementById('gpsBtn');

        // Speech Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-GB';
        recognition.interimResults = false;
        let useGPS = false;

        async function initApp() {
            if (isEncryptMode) {
                document.getElementById('encryptionMode').innerHTML = '<span class="secure-badge">AES-256 ENCRYPTION ACTIVE</span>';
                while (!encryptionKey || encryptionKey.length < 6) {
                    encryptionKey = prompt("Enter Security Passphrase (min 6 chars):");
                    if (!encryptionKey) { location.href = "about:blank"; break; }
                }
            }
            checkUser();
        }

        function checkUser() {
            if (!userName) {
                userName = prompt("Enter Name:");
                if (!userName) userName = "Guest_" + Math.floor(Math.random() * 1000);
                localStorage.setItem('loggerUserName', userName);
            }
            document.getElementById('userNameText').innerText = userName;
        }

        function changeUser() { localStorage.removeItem('loggerUserName'); userName = null; checkUser(); }

        voiceBtn.onclick = () => { useGPS = false; startRecording(); };
        gpsBtn.onclick = () => { useGPS = true; startRecording(); };

        function startRecording() {
            display.innerText = "";
            recognition.start();
            status.innerText = "Listening...";
            voiceBtn.classList.add('recording');
            gpsBtn.classList.add('recording');
        }

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            display.innerText = "Note Captured";
            status.innerText = "Encrypting...";
            if (useGPS) {
                navigator.geolocation.getCurrentPosition(
                    (p) => prepareAndSend(text, p.coords.latitude, p.coords.longitude),
                    (e) => prepareAndSend(text, "GPS Error", "GPS Error")
                );
            } else {
                prepareAndSend(text, "N/A", "N/A");
            }
        };

        async function prepareAndSend(text, lat, lon) {
            const savedId = localStorage.getItem('loggerUserID');
            let finalPayload = { id: savedId, user: userName, text: text, lat: lat, lon: lon };

            if (isEncryptMode) {
                // Scramble everything except timestamp (handled by Sheet)
                const secretString = JSON.stringify(finalPayload);
                const encryptedString = await encryptData(secretString, encryptionKey);
                // Bespoke format to distinguish from plain text
                finalPayload = { 
                    id: "SECURE", 
                    user: "SECURE", 
                    text: "VAULT[" + encryptedString + "]", 
                    lat: "SECURE", 
                    lon: "SECURE" 
                };
            }
            sendToSheet(finalPayload);
        }

        function sendToSheet(payload) {
            status.innerText = "Sending...";
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                status.innerText = "Saved Successfully!";
                setTimeout(() => { status.innerText = "Ready"; display.innerText = ""; }, 3000);
            });
        }

        recognition.onend = () => {
            voiceBtn.classList.remove('recording');
            gpsBtn.classList.remove('recording');
        };

        initApp();
    }
</script>
</body>
</html>
