<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Vault Logger</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        .box { border: 1px solid #ccc; padding: 15px; border-radius: 8px; }
        input, button, textarea { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h3>Vault Logger</h3>
    <form id="vaultForm">
        <input type="text" id="deployUrl" placeholder="Deployment URL (or from URL/Storage)">
        <input type="password" id="passphrase" name="password" autocomplete="current-password" placeholder="Passphrase (min 10 chars)" required minlength="10">
        <input type="text" id="userId" placeholder="Your ID (e.g. USER1)">
        <input type="text" id="userName" placeholder="Your Name">
        <textarea id="message" placeholder="Message to encrypt..."></textarea>
        <button type="button" onclick="sendVault()">Lock and Send</button>
    </form>
    <div id="status"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const deployParam = urlParams.get('deploy');
    if (deployParam) {
        localStorage.setItem('saved_deploy_url', deployParam);
        document.getElementById('deployUrl').value = deployParam;
    } else {
        document.getElementById('deployUrl').value = localStorage.getItem('saved_deploy_url') || "";
    }

    async function sendVault() {
        const pass = document.getElementById('passphrase').value;
        const deploy = document.getElementById('deployUrl').value;
        if (!pass || !deploy) return alert("Passphrase and Deployment URL required.");
        
        const status = document.getElementById('status');
        status.innerText = "Encrypting...";

        // --- Crypto Logic ---
        const enc = new TextEncoder();
        const keyMat = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
        const key = await crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: enc.encode("static-salt-2026"), iterations: 100000, hash: "SHA-256" },
            keyMat, { name: "AES-GCM", length: 256 }, false, ["encrypt"]
        );

        const iv = crypto.getRandomValues(new Uint8Array(12));
        const payload = JSON.stringify({
            id: document.getElementById('userId').value,
            user: document.getElementById('userName').value,
            text: document.getElementById('message').value,
            lat: "SECURE", lon: "SECURE" // GPS logic would go here
        });

        const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, enc.encode(payload));
        const combined = new Uint8Array(iv.length + encrypted.byteLength);
        combined.set(iv); combined.set(new Uint8Array(encrypted), iv.length);
        const vaultString = "VAULT[" + btoa(String.fromCharCode(...combined)) + "]";

        fetch(deploy, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ id: "SECURE", user: "SECURE", text: vaultString, lat: "SECURE", lon: "SECURE" })
        }).then(() => {
            status.innerText = "Sent Successfully!";
            document.getElementById('message').value = "";
        });
    }
</script>
</body>
</html>
