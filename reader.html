<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reader</title>
    <link rel="manifest" href="manifest-reader.json">
    <link rel="apple-touch-icon" href="Reader_Icon.png">
    <style>
        body { font-family: "Courier New", Courier, monospace; font-size: 13px; padding: 10px; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 4px 8px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background: #eee; font-weight: bold; }
        td:hover { overflow: visible; white-space: normal; background: #ffffd0; position: relative; z-index: 10; }
        .controls { border: 1px solid #000; padding: 10px; display: inline-block; background: #fafafa; }
        .input-row { display: flex; align-items: flex-start; gap: 10px; }
        input[type="password"] { height: 22px; width: 180px; border: 1px solid #000; font-family: inherit; }
        .ctrl-btn { font-family: inherit; font-size: 12px; background: #fff; border: 1px solid #000; cursor: pointer; padding: 0 8px; height: 22px; }
    </style>
</head>
<body>

<div class="controls">
    <form onsubmit="event.preventDefault(); fetchData();">
        <div class="input-row">
            <strong>Key:</strong> 
            <input type="password" id="passphrase" oninput="liveFetch()">
            <label><input type="checkbox" onchange="document.getElementById('passphrase').type = this.checked ? 'text' : 'password'"> Show</label>
            <button type="submit" class="ctrl-btn">🔄 Refresh</button>
            <button type="button" class="ctrl-btn" id="copyBtn">Copy TSV</button>
        </div>
    </form>
    <div id="status" style="margin-top:8px; font-weight: bold;">Ready.</div>
</div>

<table id="mainTable">
    <thead><tr><th style="width:160px">Timestamp</th><th style="width:60px">ID</th><th style="width:100px">User</th><th>Message</th><th style="width:100px">GPS</th></tr></thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    const urlParams = new URLSearchParams(window.location.search);
    const logId = urlParams.get('id') || localStorage.getItem('loggerUserID');
    const deployUrl = urlParams.get('deploy') || localStorage.getItem('saved_deploy_url');
    if (logId) localStorage.setItem('loggerUserID', logId);
    if (deployUrl) localStorage.setItem('saved_deploy_url', deployUrl);

    async function liveFetch() { if (document.getElementById('passphrase').value.length >= 10) fetchData(); }

    async function getThumbprint(pass) {
        const uID = localStorage.getItem('loggerUserID') || "";
        const msgUint8 = new TextEncoder().encode(pass + "salt2026" + uID);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 8);
    }

    async function decrypt(blob, pass) {
        try {
            const uID = localStorage.getItem('loggerUserID') || "";
            const combined = Uint8Array.from(atob(blob), c => c.charCodeAt(0));
            const iv = combined.slice(0, 12);
            const ciphertext = combined.slice(12);
            const enc = new TextEncoder();
            const keyMat = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
            const key = await crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: enc.encode("static-salt-2026" + uID), iterations: 100000, hash: "SHA-256" },
                keyMat, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
            );
            const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ciphertext);
            return new TextDecoder().decode(dec);
        } catch(e) { return null; }
    }

    async function fetchData() {
        const pass = document.getElementById('passphrase').value;
        if (!deployUrl || pass.length < 10) return;
        document.getElementById('status').innerText = "Syncing...";
        const thumb = await getThumbprint(pass);
        try {
            const r = await fetch(`${deployUrl}?read=true&audit=${thumb}`);
            const data = await r.json();
            renderTable(data, pass);
        } catch(e) { document.getElementById('status').innerText = "Sync failed."; }
    }

    async function renderTable(rawData, pass) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        let count = 0;
        for (let row of [...rawData].reverse()) {
            if (row.text && row.text.startsWith("VAULT[")) {
                const dec = await decrypt(row.text.substring(6, row.text.length-1), pass);
                if (dec) {
                    const obj = JSON.parse(dec);
                    count++;
                    const tr = document.createElement('tr');
                    const gps = (obj.lat && obj.lat !== "N/A") ? `<a href="https://maps.google.com/?q=${obj.lat},${obj.lon}" target="_blank">Map</a>` : "N/A";
                    tr.innerHTML = `<td>${row.timestamp}</td><td>${obj.id}</td><td>${obj.user}</td><td>${obj.text}</td><td>${gps}</td>`;
                    tbody.appendChild(tr);
                }
            }
        }
        document.getElementById('status').innerText = count + " records.";
    }
</script>
</body>
</html>
