<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Vault Reader</title>
    <style>
        body { font-family: "Courier New", Courier, monospace; font-size: 13px; padding: 10px; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 4px 8px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background: #eee; font-weight: bold; }
        td:hover { overflow: visible; white-space: normal; background: #ffffd0; position: relative; z-index: 10; }
        
        .controls { border: 1px solid #000; padding: 10px; display: inline-block; background: #fafafa; }
        
        /* Strict Alignment */
        .input-row { display: flex; align-items: flex-start; gap: 10px; }
        .label-group { display: flex; align-items: center; gap: 8px; height: 22px; }
        .button-stack { display: flex; flex-direction: column; gap: 2px; }
        
        input[type="password"] { 
            height: 22px; 
            box-sizing: border-box; 
            width: 180px; 
            padding: 2px 4px; 
            border: 1px solid #000; 
            font-family: inherit;
        }

        .ctrl-btn { 
            font-family: "Courier New", Courier, monospace; 
            font-size: 12px; 
            background: #fff; /* White background */
            border: 1px solid #000; 
            cursor: pointer; 
            padding: 0 8px;
            width: 130px; 
            height: 22px; /* Matches Input Box */
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            color: #000;
        }
        
        /* Force no blue background on the refresh icon */
        .ctrl-btn span { 
            background: none !important; 
            display: inline-block;
            line-height: 1;
        }
        
        .ctrl-btn:hover { background: #eee; }
        
        .map-link { color: blue; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="controls">
    <form id="vaultForm" onsubmit="event.preventDefault(); fetchData();">
        <div class="input-row">
            <div class="label-group">
                <strong>Key:</strong> 
                <input type="password" id="passphrase" name="password" autocomplete="current-password" oninput="renderTable()">
                <label style="font-size: 11px; display: flex; align-items: center; gap: 4px; cursor: pointer; white-space: nowrap;">
                    <input type="checkbox" onchange="document.getElementById('passphrase').type = this.checked ? 'text' : 'password'"> Show
                </label>
            </div>

            <div class="button-stack">
                <button type="submit" class="ctrl-btn"><span>🔄 Refresh</span></button>
                <button type="button" class="ctrl-btn" id="copyBtn"><span>Copy Records</span></button>
            </div>
        </div>
    </form>
    
    <div id="status" style="margin-top:8px; font-weight: bold;">Enter key to scan...</div>
</div>

<table id="mainTable">
    <thead>
        <tr>
            <th style="width:160px">Timestamp</th>
            <th style="width:80px">ID</th>
            <th style="width:120px">User</th>
            <th>Message (Hover to Expand)</th>
            <th style="width:120px">GPS</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
    let rawData = [];
    const fmt = new Intl.DateTimeFormat('en-GB', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
    
    const urlParams = new URLSearchParams(window.location.search);
    const deployUrl = urlParams.get('deploy') || localStorage.getItem('saved_deploy_url');

    if (deployUrl) {
        localStorage.setItem('saved_deploy_url', deployUrl);
        fetchData();
    }

    async function fetchData() {
        if (!deployUrl) return;
        document.getElementById('status').innerText = "Fetching...";
        try {
            const r = await fetch(deployUrl);
            rawData = await r.json();
            renderTable();
        } catch(e) { document.getElementById('status').innerText = "Fetch failed."; }
    }

    async function getThumbprint(pass) {
        const msgUint8 = new TextEncoder().encode(pass + "salt2026");
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 8);
    }

    async function decrypt(blob, pass) {
        try {
            const combined = Uint8Array.from(atob(blob), c => c.charCodeAt(0));
            const iv = combined.slice(0, 12);
            const ciphertext = combined.slice(12);
            const enc = new TextEncoder();
            const keyMat = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
            const key = await crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: enc.encode("static-salt-2026"), iterations: 100000, hash: "SHA-256" },
                keyMat, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
            );
            const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ciphertext);
            return new TextDecoder().decode(dec);
        } catch(e) { return null; }
    }

    async function renderTable() {
        const pass = document.getElementById('passphrase').value;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        if (pass.length < 10) return;

        const currentThumb = await getThumbprint(pass);
        let count = 0;

        for (let row of [...rawData].reverse()) {
            if (row.audit === currentThumb && row.text.startsWith("VAULT[")) {
                const dec = await decrypt(row.text.substring(6, row.text.length-1), pass);
                if (dec) {
                    try {
                        const obj = JSON.parse(dec);
                        count++;
                        const tr = document.createElement('tr');
                        const dateStr = fmt.format(new Date(row.timestamp));
                        const mapLink = (!isNaN(obj.lat) && obj.lat !== null) 
                            ? `<a class="map-link" href="https://www.google.com/maps?q=${obj.lat},${obj.lon}" target="_blank">View on Map</a>` 
                            : (obj.lat || "N/A");

                        tr.innerHTML = `<td>${dateStr}</td><td>${obj.id || 'N/A'}</td><td>${obj.user || 'N/A'}</td><td>${obj.text}</td><td>${mapLink}</td>`;
                        tbody.appendChild(tr);
                    } catch(e) {}
                }
            }
        }
        document.getElementById('status').innerText = count + " records found.";
    }

    document.getElementById('copyBtn').onclick = function() {
        const table = document.getElementById('mainTable');
        let tsv = [Array.from(table.querySelectorAll('th')).map(th => th.innerText).join('\t')];
        const rows = Array.from(table.querySelectorAll('tbody tr'));
        if (rows.length === 0) return;
        rows.forEach(row => tsv.push(Array.from(row.querySelectorAll('td')).map(td => td.innerText).join('\t')));
        navigator.clipboard.writeText(tsv.join('\n')).then(() => {
            const status = document.getElementById('status');
            const old = status.innerText;
            status.innerText = "COPIED TO CLIPBOARD (TSV)";
            setTimeout(() => status.innerText = old, 2000);
        });
    };

    window.onload = () => { if(document.getElementById('passphrase').value) renderTable(); };
</script>
</body>
</html>
