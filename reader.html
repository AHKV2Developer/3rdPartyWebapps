<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Vault Reader</title>
    <style>
        body { font-family: "Courier New", Courier, monospace; font-size: 13px; padding: 10px; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 4px 8px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background: #eee; font-weight: bold; }
        td:hover { overflow: visible; white-space: normal; background: #ffffd0; position: relative; z-index: 10; }
        .controls { border: 1px solid #000; padding: 10px; display: inline-block; background: #fafafa; }
        
        /* Unified Button Styling */
        .btn-stack { display: flex; flex-direction: column; gap: 4px; margin-top: 10px; }
        .ctrl-btn { 
            font-family: "Courier New", Courier, monospace; 
            font-size: 12px; 
            background: none; 
            border: 1px solid #000; 
            cursor: pointer; 
            padding: 4px;
            width: 120px; /* Fixed width to ensure alignment */
            text-align: center;
        }
        .ctrl-btn:hover { background: #eee; }
        
        .map-link { color: blue; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="controls">
    <form onsubmit="event.preventDefault(); fetchData();">
        <strong>Key:</strong> 
        <input type="password" id="passphrase" autocomplete="current-password" oninput="renderTable()">
        <label style="font-size: 11px; margin-left:5px;">
            <input type="checkbox" onchange="document.getElementById('passphrase').type = this.checked ? 'text' : 'password'"> Show
        </label>
    </form>
    
    <div class="btn-stack">
        <button type="button" class="ctrl-btn" onclick="fetchData()">Refresh</button>
        <button type="button" class="ctrl-btn" onclick="copyToClipboard()">Copy Records</button>
    </div>
    
    <div id="status" style="margin-top:8px; font-weight: bold;">Enter key to scan...</div>
</div>

<table id="mainTable">
    <thead>
        <tr>
            <th style="width:160px">Timestamp</th>
            <th style="width:80px">ID</th>
            <th style="width:120px">User</th>
            <th>Message (Hover to Expand)</th>
            <th style="width:120px">GPS</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
    let rawData = [];
    const fmt = new Intl.DateTimeFormat('en-GB', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
    
    const urlParams = new URLSearchParams(window.location.search);
    const deployUrl = urlParams.get('deploy') || localStorage.getItem('saved_deploy_url');

    if (deployUrl) {
        localStorage.setItem('saved_deploy_url', deployUrl);
        fetchData();
    }

    async function fetchData() {
        if (!deployUrl) return;
        document.getElementById('status').innerText = "Fetching...";
        try {
            const r = await fetch(deployUrl);
            rawData = await r.json();
            renderTable();
        } catch(e) {
            document.getElementById('status').innerText = "Fetch failed.";
        }
    }

    async function decrypt(blob, pass) {
        try {
            const combined = Uint8Array.from(atob(blob), c => c.charCodeAt(0));
            const iv = combined.slice(0, 12);
            const ciphertext = combined.slice(12);
            const enc = new TextEncoder();
            const keyMat = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
            const key = await crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: enc.encode("static-salt-2026"), iterations: 100000, hash: "SHA-256" },
                keyMat, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
            );
            const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ciphertext);
            return new TextDecoder().decode(dec);
        } catch(e) { return null; }
    }

    async function renderTable() {
        const pass = document.getElementById('passphrase').value;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        if (pass.length < 10) return;

        let count = 0;
        for (let row of [...rawData].reverse()) {
            if (row.text && row.text.startsWith("VAULT[")) {
                const dec = await decrypt(row.text.substring(6, row.text.length-1), pass);
                if (dec) {
                    try {
                        const obj = JSON.parse(dec);
                        count++;
                        const tr = document.createElement('tr');
                        const dateStr = fmt.format(new Date(row.timestamp));
                        
                        // Restored "View on Map" text
                        const mapLink = (!isNaN(obj.lat) && obj.lat !== null) 
                            ? `<a class="map-link" href="https://www.google.com/maps?q=${obj.lat},${obj.lon}" target="_blank">View on Map</a>` 
                            : (obj.lat || "N/A");

                        tr.innerHTML = `<td>${dateStr}</td><td>${obj.id || 'N/A'}</td><td>${obj.user || 'N/A'}</td><td>${obj.text}</td><td>${mapLink}</td>`;
                        tbody.appendChild(tr);
                    } catch(e) {}
                }
            }
        }
        document.getElementById('status').innerText = count + " records found.";
    }

    function copyToClipboard() {
        const table = document.getElementById('mainTable');
        let tsv = [];
        
        // Headers
        const headers = Array.from(table.querySelectorAll('th')).map(th => th.innerText);
        tsv.push(headers.join('\t'));

        // Decrypted Rows
        const rows = Array.from(table.querySelectorAll('tbody tr'));
        if (rows.length === 0) {
            alert("No records to copy.");
            return;
        }

        rows.forEach(row => {
            const cells = Array.from(row.querySelectorAll('td')).map(td => td.innerText);
            tsv.push(cells.join('\t'));
        });

        const fullTsv = tsv.join('\n');
        navigator.clipboard.writeText(fullTsv).then(() => {
            const oldStatus = document.getElementById('status').innerText;
            document.getElementById('status').innerText = "Copied to Clipboard (TSV)";
            setTimeout(() => { document.getElementById('status').innerText = oldStatus; }, 2000);
        });
    }

    window.onload = () => { if(document.getElementById('passphrase').value) renderTable(); };
</script>
</body>
</html>
